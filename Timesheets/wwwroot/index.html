<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timesheets</title>
    <base href="/" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="_content/Havit.Blazor.Components.Web.Bootstrap/defaults.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Timesheets.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <noscript>
        <div class="govuk-width-container govuk-body">
            <main class="govuk-main-wrapper govuk-main-wrapper--l" id="main-content" role="main" aria-label="No JavaScript support">
                <div class="govuk-grid-row">
                    <div class="govuk-grid-column-full">
                        <h1 class="govuk-heading-l">Sorry, your web browser isn't capable of using this site</h1>
                        <p>
                            You browser must support the use of JavaScript. Please check your browser supports JavaScript and it is enabled.
                        </p>
                        <ul>
                            <li><a href="https://caniuser.com/es6">Web browser support for JavaScript</a></li>
                        </ul>
                    </div>
                </div>
            </main>
        </div>
    </noscript>
    <div id="wasmMissing" style="display: none;">
        <div class="govuk-width-container govuk-body">
            <main class="govuk-main-wrapper govuk-main-wrapper--l" id="main-content" role="main" aria-label="No WebAssembly support">
                <div class="govuk-grid-row">
                    <div class="govuk-grid-column-full">
                        <h1 class="govuk-heading-l">Sorry, your web browser isn't capable of using this site</h1>
                        <p>
                            You browser must support the use of WebAssembly. Please check your browser supports WebAssembly and it is enabled.
                        </p>
                        <ul>
                            <li><a href="https://caniuser.com/wasm">Web browser support for WebAssembly</a></li>
                        </ul>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script type="text/javascript">
        window.BlazorScrollToId = function (id) {
            const element = document.getElementById(id);
            if (element instanceof HTMLElement) {
                element.scrollIntoView({
                    behavior: "smooth",
                    block: "start",
                    inline: "nearest"
                });
            }
        }

        window.BlazorScrollToTop = function () {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.BlazorGoBack = function () {
            window.history.back();
        }

        const debounce = (fn) => {
            // This holds the requestAnimationFrame reference, so we can cancel it if we wish
            let frame;

            // The debounce function returns a new function that can receive a variable number of arguments
            return (...params) => {
                // If the frame variable has been defined, clear it now, and queue for next frame
                if (frame) {
                    cancelAnimationFrame(frame);
                }

                // Queue our function call for the next frame
                frame = requestAnimationFrame(() => {
                    // Call our function and pass any params we received
                    fn(...params);
                });
            };
        };

        const storeScroll = () => {
            document.documentElement.dataset.scroll = window.scrollY.toString();
        }

        document.addEventListener('scroll', debounce(storeScroll), { passive: true });
        storeScroll();

        window.GetClientWidth = (elem) => {
            console.log('Getting width of element', elem, elem.clientWidth);
            return elem.clientWidth || 0;
        }
        window.GetClientHeight = (elem) => {
            console.log('Getting height of element', elem, elem.clientHeight);
            return elem.clientHeight;
        }

        window.Click = (id) => {
            document.getElementById(id).click();
        };
    </script>

    <script src="_content/Microsoft.Authentication.WebAssembly.Msal/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script src="js/browser-resize.js"></script>
    <script>
        //check if webassembly is supported
        const webassemblySupported = (function () {
            try {
                if (typeof WebAssembly === "object"
                    && typeof WebAssembly.instantiate === "function") {
                    const module = new WebAssembly.Module(
                        Uint8Array.of(0x0, 0x61, 0x73, 0x6d,
                            0x01, 0x00, 0x00, 0x00));
                    if (module instanceof WebAssembly.Module)
                        return new WebAssembly.Instance(module)
                            instanceof WebAssembly.Instance;
                }
            } catch (e) {
            }
            return false;
        })();

        // Modern browsers e.g. Microsoft Edge
        if (webassemblySupported) {
            Blazor.start({});
        }
        // Older browsers e.g. IE11
        else {
            document.getElementById("wasmMissing").style.display = "block";
        }
    </script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
